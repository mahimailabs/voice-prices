[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "voice-prices"
dynamic = ["version"]
description = "Calculate prices for calling LLM, STT and TTS inference APIs. Fork of pydantic/genai-prices with voice-modality support."
readme = "README.md"
authors = [{ name = "Mahimai Raja J", email = "mahimairaja3@gmail.com" }]
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Unix",
    "Operating System :: POSIX :: Linux",
    "Environment :: Console",
    "Environment :: MacOS X",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet",
]
dependencies = [
    "httpx2>=2.0",
    "pydantic>=2.10",
]

[project.optional-dependencies]
cli = [
    "pydantic-settings>=2.11",
    "rich>=14.3.2",
    "rich-argparse>=1.7.2",
]

[project.scripts]
voice-prices = "voice_prices._cli:cli"

[project.urls]
Homepage = "https://github.com/mahimailabs/voice-prices"
Source = "https://github.com/mahimailabs/voice-prices"
Changelog = "https://github.com/mahimailabs/voice-prices/releases"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../..", fallback_version = "0.0.0" }

[tool.hatch.build.targets.wheel]
packages = ["voice_prices"]
