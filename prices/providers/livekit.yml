# yaml-language-server: $schema=.schema.json
name: LiveKit Inference
id: livekit
pricing_urls:
  - https://livekit.io/pricing
api_pattern: 'https://[^/]*\.livekit\.cloud'
provider_match:
  contains: livekit
price_comments: >-
  LiveKit Inference is a gateway that resells STT, TTS, and LLM models under a single API key, at
  its own per-model rates (distinct from buying direct from each vendor). These are the
  Build/Ship tier prices, which LiveKit publishes identically for both plans; Scale-tier
  discounts live in the livekit-scale provider. Resolution is by explicit provider_id
  (VoiceGateway passes provider_id=livekit); model_match is intentionally omitted so a bare model
  ref still resolves to the direct vendor. Conversions: STT $/min to input_audio_kseconds
  (x1000/60); TTS $/1M chars to input_kchars (/1000); LLM $/1M tokens map 1:1. Realtime bundled
  models and LiveKit Cloud platform per-minute rates are out of scope. Source: LiveKit
  get_pricing_info; regenerate with make livekit-get.
models:
