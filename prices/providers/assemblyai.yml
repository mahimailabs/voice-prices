# yaml-language-server: $schema=.schema.json
name: AssemblyAI
id: assemblyai
pricing_urls:
  - https://www.assemblyai.com/pricing

api_pattern: 'https://api\.assemblyai\.com'

model_match:
  starts_with: universal-

provider_match:
  contains: assemblyai

models:
  - id: universal-2
    name: Universal-2
    description: >-
      AssemblyAI Universal-2 speech-to-text. Async / prerecorded transcription tier.
      The real-time Universal-Streaming tier shares the same base rate.
    match:
      equals: universal-2
    prices_checked: 2026-05-29
    pricing_source_url: https://www.assemblyai.com/pricing
    price_comments: >-
      Source rate $0.15/hour = $0.0025/minute (base rate, excludes add-ons such as
      diarization or entity detection). Converted to $/k seconds:
      0.0025 * 1000 / 60 ~= 0.041667.
    prices:
      input_audio_kseconds: 0.041667
