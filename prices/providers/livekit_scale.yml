# yaml-language-server: $schema=.schema.json
name: LiveKit Inference (Scale)
id: livekit-scale
pricing_urls:
  - https://livekit.io/pricing
api_pattern: 'https://[^/]*\.livekit\.cloud'
fallback_model_providers:
  - livekit
price_comments: >-
  Scale-tier prices for LiveKit Inference. Only models whose Scale rate differs from Build/Ship
  are listed here; LLM models (identical across all tiers) and flat-priced voice models fall back
  to the livekit provider via fallback_model_providers. Same conversions and source as the
  livekit provider.
