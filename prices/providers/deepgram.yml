# yaml-language-server: $schema=.schema.json
name: Deepgram
id: deepgram
pricing_urls:
  - https://deepgram.com/pricing

api_pattern: 'https://api\.deepgram\.com'

model_match:
  or:
    - starts_with: aura-
    - starts_with: nova-
    - starts_with: flux-

provider_match:
  contains: deepgram

models:
  - id: aura-1
    name: Aura
    description: >-
      Deepgram's original Aura TTS family. Per-character pricing is uniform across
      all voices in the family. Voice IDs are formatted aura-<voice>-<lang> (no
      version number in the slug), e.g. aura-asteria-en, aura-luna-en.
    # Match aura-* but NOT aura-2-*: the Aura-1 family voice IDs don't carry a
    # version number, while Aura-2 does.
    match:
      regex: '^aura-(?!2)'
    prices_checked: 2026-05-27
    pricing_source_url: https://deepgram.com/pricing
    prices:
      input_kchars: 0.015

  - id: aura-2
    name: Aura-2
    description: >-
      Deepgram's second-generation Aura TTS family. Per-character pricing is uniform
      across all voices in the family. Voice IDs include the version, e.g.
      aura-2-helios-en, aura-2-thalia-en.
    match:
      starts_with: aura-2
    prices_checked: 2026-05-27
    pricing_source_url: https://deepgram.com/pricing
    prices:
      input_kchars: 0.030

  - id: flux-general
    name: Flux (streaming)
    description: >-
      Deepgram Flux conversational speech recognition for real-time voice agents,
      with built-in turn detection and interruption handling. English. Use
      `flux-general` for streaming, `flux-general-batch` for prerecorded.
    match:
      equals: flux-general
    prices_checked: 2026-05-29
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0065/minute (Pay As You Go streaming). Converted to $/k seconds:
      0.0065 * 1000 / 60 ~= 0.108333.
    prices:
      input_audio_kseconds: 0.108333

  - id: flux-general-batch
    name: Flux (batch)
    description: >-
      Deepgram Flux prerecorded / batch transcription, English. Flux is primarily a
      real-time model; this is the prerecorded rate.
    match:
      equals: flux-general-batch
    prices_checked: 2026-05-29
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0077/minute (Pay As You Go prerecorded). Converted to $/k seconds:
      0.0077 * 1000 / 60 ~= 0.128333.
    prices:
      input_audio_kseconds: 0.128333

  - id: nova-2
    name: Nova-2 (streaming)
    description: >-
      Deepgram Nova-2 streaming STT, English / monolingual. Previous-generation
      model. Use `nova-2` for streaming, `nova-2-batch` for prerecorded.
    match:
      equals: nova-2
    prices_checked: 2026-05-29
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0059/minute (streaming). Converted to $/k seconds:
      0.0059 * 1000 / 60 ~= 0.098333. Nova-2 is a legacy model: Deepgram no longer
      lists its per-minute rate in the public pricing table (the FAQ states older
      models remain available), so this rate is from independent sources tracking
      Deepgram's published Nova-2 pricing. Verify before relying on it.
    prices:
      input_audio_kseconds: 0.098333

  - id: nova-2-batch
    name: Nova-2 (batch)
    description: >-
      Deepgram Nova-2 prerecorded / batch STT, English / monolingual. Legacy model.
    match:
      equals: nova-2-batch
    prices_checked: 2026-05-29
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0043/minute (prerecorded). Converted to $/k seconds:
      0.0043 * 1000 / 60 ~= 0.071667. Nova-2 is a legacy model no longer listed in
      Deepgram's public pricing table; rate from independent sources. Verify before
      relying on it.
    prices:
      input_audio_kseconds: 0.071667

  - id: nova-3
    name: Nova-3 (monolingual streaming)
    description: >-
      Deepgram Nova-3 streaming STT, English / monolingual rate. Real-time
      transcription model. Use `nova-3` for streaming, `nova-3-batch` for
      prerecorded. Use `nova-3-multilingual` (or `-batch` variant) for non-English
      or mixed-language workloads at Deepgram's higher multilingual rate.
    match:
      equals: nova-3
    prices_checked: 2026-05-28
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0048/minute. Converted to $/k seconds:
      0.0048 * 1000 / 60 = 0.08 exactly.
    prices:
      input_audio_kseconds: 0.08

  - id: nova-3-batch
    name: Nova-3 (monolingual batch)
    description: >-
      Deepgram Nova-3 prerecorded / batch STT, English / monolingual rate.
      Higher per-minute than streaming.
    match:
      equals: nova-3-batch
    prices_checked: 2026-05-28
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0077/minute. Converted to $/k seconds:
      0.0077 * 1000 / 60 ~= 0.12833.
    prices:
      input_audio_kseconds: 0.12833

  - id: nova-3-multilingual
    name: Nova-3 (multilingual streaming)
    description: >-
      Deepgram Nova-3 streaming STT, multilingual rate. Use for non-English or
      mixed-language workloads. Higher per-minute than the monolingual rate.
    match:
      equals: nova-3-multilingual
    prices_checked: 2026-05-28
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0058/minute. Converted to $/k seconds:
      0.0058 * 1000 / 60 ~= 0.09667.
    prices:
      input_audio_kseconds: 0.09667

  - id: nova-3-multilingual-batch
    name: Nova-3 (multilingual batch)
    description: >-
      Deepgram Nova-3 prerecorded / batch STT, multilingual rate.
    match:
      equals: nova-3-multilingual-batch
    prices_checked: 2026-05-28
    pricing_source_url: https://deepgram.com/pricing
    price_comments: >-
      Source rate $0.0092/minute. Converted to $/k seconds:
      0.0092 * 1000 / 60 ~= 0.15333.
    prices:
      input_audio_kseconds: 0.15333
