# yaml-language-server: $schema=.schema.json
name: ElevenLabs
id: elevenlabs
pricing_urls:
  - https://elevenlabs.io/pricing/api

api_pattern: 'https://api\.elevenlabs\.io'

model_match:
  starts_with: eleven_

provider_match:
  contains: elevenlabs

price_comments: >-
  ElevenLabs publishes a per-character API rate that is consistent across paid
  subscription tiers (higher tiers include a larger character allowance, not a
  lower per-character rate). This catalog uses that published API rate: Flash and
  Turbo models are $0.05/kchar (0.5 credits/character) and Multilingual v2 is
  $0.10/kchar (1 credit/character). See https://elevenlabs.io/pricing/api.

models:
  - id: eleven_flash_v2
    name: Eleven Flash v2
    description: >-
      Low-latency English TTS model (the v2 predecessor of Flash v2.5). Same
      per-character API rate as Flash v2.5.
    match:
      equals: eleven_flash_v2
    prices_checked: 2026-06-06
    pricing_source_url: https://elevenlabs.io/pricing/api
    price_comments: >-
      $0.05/kchar via the ElevenLabs API (Flash/Turbo, 0.5 credits/character).
    prices:
      input_kchars: 0.05

  - id: eleven_flash_v2_5
    name: Eleven Flash v2.5
    description: >-
      Low-latency multilingual TTS model. Optimized for real-time / streaming
      use cases. Same per-character API rate as Turbo v2.5.
    match:
      starts_with: eleven_flash_v2_5
    # collapse: false because this id starts with eleven_flash_v2 and shares its price; without the pin
    # the collapse hook would merge this row into eleven_flash_v2 and drop the v2.5 comparison.
    collapse: false
    prices_checked: 2026-06-06
    pricing_source_url: https://elevenlabs.io/pricing/api
    price_comments: >-
      $0.05/kchar via the ElevenLabs API (Flash/Turbo, 0.5 credits/character).
    prices:
      input_kchars: 0.05

  - id: eleven_multilingual_v2
    name: Eleven Multilingual v2
    description: >-
      Full-fidelity multilingual TTS model. Higher per-character cost than
      Turbo/Flash; used when output quality matters more than latency.
    match:
      starts_with: eleven_multilingual_v2
    prices_checked: 2026-06-06
    pricing_source_url: https://elevenlabs.io/pricing/api
    price_comments: >-
      $0.10/kchar via the ElevenLabs API (Multilingual v2, 1 credit/character).
    prices:
      input_kchars: 0.1

  - id: eleven_turbo_v2
    name: Eleven Turbo v2
    description: >-
      Low-latency TTS model (the v2 predecessor of Turbo v2.5). Same
      per-character API rate as Turbo v2.5.
    match:
      equals: eleven_turbo_v2
    prices_checked: 2026-06-06
    pricing_source_url: https://elevenlabs.io/pricing/api
    price_comments: >-
      $0.05/kchar via the ElevenLabs API (Flash/Turbo, 0.5 credits/character).
    prices:
      input_kchars: 0.05

  - id: eleven_turbo_v2_5
    name: Eleven Turbo v2.5
    description: >-
      ElevenLabs' fastest multilingual TTS model. Designed for real-time use
      cases where latency matters more than absolute audio fidelity.
    match:
      starts_with: eleven_turbo_v2_5
    # collapse: false for the same reason as eleven_flash_v2_5 above (shares price + id prefix with
    # eleven_turbo_v2, which would otherwise merge this row away).
    collapse: false
    prices_checked: 2026-06-06
    pricing_source_url: https://elevenlabs.io/pricing/api
    price_comments: >-
      $0.05/kchar via the ElevenLabs API (Flash/Turbo, 0.5 credits/character).
    prices:
      input_kchars: 0.05
