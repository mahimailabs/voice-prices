name: Deploy site
on:
  push:
    branches:
      - main
    paths:
      - prices/data.json
      - prices/src/prices/build_site.py
      - prices/src/prices/templates/site.html
      - .github/workflows/pages.yml
  workflow_dispatch: {}

permissions:
  contents: read

# Allow one site deploy at a time; do not cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      # Install the `prices` workspace member so `uv run -m prices ...` resolves to
      # the package and not the repo-root `prices/` directory (a namespace package
      # with no __main__). Matches the sync step in ci.yml.
      - run: uv sync --frozen --all-packages
      - run: make build-site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
